<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票代號擷取工具</title>
    <!-- 引入 Tailwind CSS 進行美化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei';
            background-color: #f3f4f6;
        }
        /* 自訂滾動條 */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-2xl w-full">
        <!-- 標題區塊 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">股票代號擷取工具</h1>
            <p class="text-gray-500 text-sm">上傳股東會或庫存 CSV 檔案，自動擷取並串接股票代號</p>
        </div>

        <!-- 檔案上傳區塊 -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">1. 選擇 CSV 檔案</label>
            <div class="flex items-center justify-center w-full">
                <label for="csvFileInput" class="flex flex-col items-center justify-center w-full h-32 border-2 border-blue-300 border-dashed rounded-lg cursor-pointer bg-blue-50 hover:bg-blue-100 transition-colors">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <svg class="w-8 h-8 mb-3 text-blue-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/>
                        </svg>
                        <p class="mb-2 text-sm text-gray-700"><span class="font-semibold text-blue-600">點擊上傳</span> 或將檔案拖曳至此</p>
                        <p class="text-xs text-gray-500">支援 .csv 格式</p>
                    </div>
                    <input id="csvFileInput" type="file" accept=".csv" class="hidden" />
                </label>
            </div>
            <p id="fileNameDisplay" class="mt-2 text-sm text-green-600 hidden font-medium">已選取檔案：<span id="fileNameText"></span></p>
        </div>

        <!-- 篩選條件區塊 -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">2. 篩選條件 (投票狀況)</label>
            <div class="flex items-center space-x-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <label class="flex items-center cursor-pointer">
                    <input type="radio" name="voteStatus" value="all" checked class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                    <span class="ml-2 text-gray-700">全部</span>
                </label>
                <label class="flex items-center cursor-pointer">
                    <input type="radio" name="voteStatus" value="voted" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                    <span class="ml-2 text-gray-700">只擷取「已投票」</span>
                </label>
                <label class="flex items-center cursor-pointer">
                    <input type="radio" name="voteStatus" value="unvoted" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                    <span class="ml-2 text-gray-700">只擷取「未投票」</span>
                </label>
            </div>
        </div>

        <!-- 結果顯示區塊 -->
        <div class="mb-4">
            <div class="flex justify-between items-end mb-2">
                <label class="block text-sm font-medium text-gray-700">3. 擷取結果</label>
                <span id="countDisplay" class="text-xs text-gray-500 hidden">共找到 <span id="countNumber" class="font-bold text-blue-600">0</span> 筆代號</span>
            </div>
            <textarea id="resultArea" readonly class="w-full h-40 p-4 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none" placeholder="擷取後的代號會顯示在這裡..."></textarea>
        </div>

        <!-- 複製按鈕區塊 -->
        <div class="flex items-center space-x-4">
            <button id="copyBtn" onclick="copyToClipboard()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors flex items-center justify-center opacity-50 cursor-not-allowed" disabled>
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                複製代號
            </button>
            <div id="copyMsg" class="hidden px-4 py-2 bg-green-100 text-green-700 rounded-lg text-sm font-medium transition-opacity">
                ✅ 已複製到剪貼簿！
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('csvFileInput');
        const resultArea = document.getElementById('resultArea');
        const copyBtn = document.getElementById('copyBtn');
        const copyMsg = document.getElementById('copyMsg');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const fileNameText = document.getElementById('fileNameText');
        const countDisplay = document.getElementById('countDisplay');
        const countNumber = document.getElementById('countNumber');

        // 儲存原始 CSV 資料，以便切換選項時不用重新上傳
        let globalCSVText = "";

        // 監聽單選按鈕切換事件
        const radioButtons = document.querySelectorAll('input[name="voteStatus"]');
        radioButtons.forEach(radio => {
            radio.addEventListener('change', function() {
                if (globalCSVText) {
                    processCSV(globalCSVText);
                }
            });
        });

        // 監聽檔案上傳事件
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 顯示檔案名稱
            fileNameText.textContent = file.name;
            fileNameDisplay.classList.remove('hidden');

            const reader = new FileReader();
            
            // 使用 Big5 編碼讀取，避免台灣常見的 Excel CSV 中文亂碼問題
            // 即使是 UTF-8，因為我們只要數字代號，這也不會影響擷取結果
            reader.readAsText(file, 'Big5');
            
            reader.onload = function(event) {
                globalCSVText = event.target.result;
                processCSV(globalCSVText);
            };

            reader.onerror = function() {
                resultArea.value = "讀取檔案發生錯誤，請重試。";
            };
        });

        // 處理 CSV 內容
        function processCSV(text) {
            // 取得目前的篩選條件
            const filterValue = document.querySelector('input[name="voteStatus"]:checked').value;

            // 分割每一行 (支援 \n 或 \r\n)
            const lines = text.trim().split(/\r?\n/);
            const codes = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue; // 跳過空行

                // 取得第一欄資料
                const firstColumn = line.split(',')[0];
                
                // 去除可能存在的等號(=)和雙引號(")，並移除空白
                const cleanCode = firstColumn.replace(/[="]/g, '').trim();

                // 檢查是否為純數字 (用來過濾掉像是 "證券代號" 這樣的標題行)
                if (/^\d+$/.test(cleanCode)) {
                    
                    // 根據投票狀況進行篩選
                    if (filterValue === 'voted' && !line.includes('已投票')) {
                        continue;
                    }
                    if (filterValue === 'unvoted' && !line.includes('未投票')) {
                        continue;
                    }

                    codes.push(cleanCode);
                }
            }

            // 將陣列用逗號串接
            const finalString = codes.join(',');
            
            // 顯示結果
            resultArea.value = finalString;

            // 顯示數量
            countNumber.textContent = codes.length;
            countDisplay.classList.remove('hidden');

            // 啟用複製按鈕
            if (codes.length > 0) {
                copyBtn.disabled = false;
                copyBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                resultArea.value = "找不到符合格式的股票代號。";
                copyBtn.disabled = true;
                copyBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        // 複製到剪貼簿功能
        function copyToClipboard() {
            if (!resultArea.value) return;

            // 選取 textarea 中的文字
            resultArea.select();
            resultArea.setSelectionRange(0, 99999); // 支援手機版

            try {
                // 執行複製指令 (使用文件建議的 execCommand 以兼容 iFrame)
                document.execCommand('copy');
                
                // 取消反白
                window.getSelection().removeAllRanges();

                // 顯示成功提示
                copyMsg.classList.remove('hidden');
                
                // 2秒後隱藏提示
                setTimeout(() => {
                    copyMsg.classList.add('hidden');
                }, 2000);
            } catch (err) {
                console.error('複製失敗', err);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>露營空間配置工具</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 以在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // --- 圖示元件 (替換原本的 lucide-react) ---
    const Move = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="19 9 22 12 19 15"/><polyline points="9 19 12 22 15 19"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="2"/></svg>;
    const Grid = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>;
    const Settings2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="7" r="3"/><circle cx="8" cy="17" r="3"/></svg>;
    const Plus = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const RotateCw = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>;
    const Trash2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;

    // --- 初始預設資料 ---
    const INITIAL_ITEMS = [
      { id: 1, name: '偉姪女\n(2大)', w: 500, h: 700, x: 20, y: 10, type: 'dashed', color: 'text-fuchsia-500', borderColor: 'border-fuchsia-600', door: null, rotation: 0 },
      { id: 2, name: '客廳帳\n310x310', w: 310, h: 310, x: 800, y: 450, type: 'solid', color: 'text-white', borderColor: 'border-white', door: null, rotation: 0 },
      { id: 3, name: '天幕\n540x440', w: 540, h: 440, x: 1150, y: 350, type: 'solid', color: 'text-white', borderColor: 'border-white', door: null, rotation: 0 },
      { id: 4, name: '珊\n(2大2小)', w: 330, h: 760, x: 1400, y: 50, type: 'dashed', color: 'text-fuchsia-500', borderColor: 'border-fuchsia-600', door: 'left', rotation: 0 },
      { id: 5, name: '偉\n(2大1小)', w: 280, h: 210, x: 1820, y: 520, type: 'dashed', color: 'text-fuchsia-500', borderColor: 'border-fuchsia-600', door: 'left', rotation: 0 },
      { id: 6, name: '學姊\n(2大)', w: 300, h: 200, x: 2150, y: 520, type: 'dashed', color: 'text-fuchsia-500', borderColor: 'border-fuchsia-600', door: 'top', rotation: 0 },
      { id: 7, name: '17\n(2大)', w: 300, h: 200, x: 2150, y: 150, type: 'dashed', color: 'text-fuchsia-500', borderColor: 'border-fuchsia-600', door: 'bottom', rotation: 0 },
      { id: 8, name: '安盛車', w: 220, h: 450, x: 2260, y: 200, type: 'dashed', color: 'text-fuchsia-500', borderColor: 'border-fuchsia-600', door: 'left', rotation: 0 },
    ];

    const TOTAL_WIDTH = 2500; // 總寬 2500 cm (1800 + 700)
    const TOTAL_HEIGHT = 800; // 總高 800 cm

    // --- 主程式 ---
    function App() {
      const [items, setItems] = useState(() => {
        const saved = localStorage.getItem('camping-layout');
        if (saved) {
          const parsed = JSON.parse(saved);
          return parsed.map(item => ({
            ...item,
            rotation: item.rotation || 0,
            name: item.name.replace('瑋', '珊') 
          }));
        }
        return INITIAL_ITEMS;
      });
      const [selectedId, setSelectedId] = useState(null);
      const [draggingId, setDraggingId] = useState(null);
      const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
      const [snapToGrid, setSnapToGrid] = useState(true);
      
      const containerRef = useRef(null);

      useEffect(() => {
        localStorage.setItem('camping-layout', JSON.stringify(items));
      }, [items]);

      const handlePointerDown = (e, id) => {
        e.stopPropagation();
        e.target.setPointerCapture(e.pointerId);
        
        setItems(prev => {
          const item = prev.find(i => i.id === id);
          const others = prev.filter(i => i.id !== id);
          return [...others, item];
        });

        const rect = containerRef.current.getBoundingClientRect();
        const scaleX = rect.width / TOTAL_WIDTH;
        const scaleY = rect.height / TOTAL_HEIGHT;

        const item = items.find(i => i.id === id);
        const offsetX = (e.clientX - rect.left) / scaleX - item.x;
        const offsetY = (e.clientY - rect.top) / scaleY - item.y;

        setDraggingId(id);
        setSelectedId(id);
        setDragOffset({ x: offsetX, y: offsetY });
      };

      const handlePointerMove = (e) => {
        if (!draggingId) return;

        const rect = containerRef.current.getBoundingClientRect();
        const scaleX = rect.width / TOTAL_WIDTH;
        const scaleY = rect.height / TOTAL_HEIGHT;

        let newX = (e.clientX - rect.left) / scaleX - dragOffset.x;
        let newY = (e.clientY - rect.top) / scaleY - dragOffset.y;

        if (snapToGrid) {
          newX = Math.round(newX / 10) * 10;
          newY = Math.round(newY / 10) * 10;
        }

        setItems(prev => prev.map(item => {
          if (item.id === draggingId) {
            const clampedX = Math.max(-item.w + 50, Math.min(newX, TOTAL_WIDTH - 50));
            const clampedY = Math.max(-item.h + 50, Math.min(newY, TOTAL_HEIGHT - 50));
            return { ...item, x: clampedX, y: clampedY };
          }
          return item;
        }));
      };

      const handlePointerUp = (e) => {
        if (draggingId) {
          e.target.releasePointerCapture(e.pointerId);
          setDraggingId(null);
        }
      };

      const updateSelectedItem = (updates) => {
        setItems(prev => prev.map(item => 
          item.id === selectedId ? { ...item, ...updates } : item
        ));
      };

      const rotateSelectedItem = () => {
        setItems(prev => prev.map(item => {
          if (item.id === selectedId) {
            const nextDoor = {
              'top': 'right',
              'right': 'bottom',
              'bottom': 'left',
              'left': 'top',
              null: null
            }[item.door];
            
            return { 
              ...item, 
              w: item.h, 
              h: item.w,
              door: nextDoor
            };
          }
          return item;
        }));
      };

      const addNewItem = () => {
        const newItem = {
          id: Date.now(),
          name: '新物件',
          w: 300,
          h: 300,
          x: 500,
          y: 250,
          type: 'dashed',
          color: 'text-blue-400',
          borderColor: 'border-blue-500',
          door: null,
          rotation: 0
        };
        setItems([...items, newItem]);
        setSelectedId(newItem.id);
      };

      const deleteSelectedItem = () => {
        if (!selectedId) return;
        setItems(prev => prev.filter(item => item.id !== selectedId));
        setSelectedId(null);
      };

      const selectedItemData = items.find(i => i.id === selectedId);

      return (
        <div className="flex flex-col h-screen bg-slate-950 text-slate-200 font-sans overflow-hidden">
          <header className="flex items-center justify-between px-6 py-3 bg-slate-900 border-b border-slate-800 shrink-0">
            <div className="flex items-center gap-2">
              <Move className="w-5 h-5 text-fuchsia-500" />
              <h1 className="text-lg font-bold tracking-wide">露營空間配置工具 (總寬 25M x 深 8M)</h1>
            </div>
            <div className="flex items-center gap-4">
              <label className="flex items-center gap-2 text-sm cursor-pointer hover:text-white transition-colors">
                <input 
                  type="checkbox" 
                  checked={snapToGrid} 
                  onChange={(e) => setSnapToGrid(e.target.checked)}
                  className="rounded bg-slate-800 border-slate-700 text-fuchsia-500 focus:ring-fuchsia-500"
                />
                <Grid className="w-4 h-4" />
                貼齊網格 (10cm)
              </label>
              <button 
                onClick={() => setItems(INITIAL_ITEMS)}
                className="text-sm px-3 py-1.5 rounded-md bg-slate-800 hover:bg-slate-700 transition-colors"
              >
                重置預設
              </button>
            </div>
          </header>

          <main className="flex-1 flex flex-col lg:flex-row overflow-hidden relative">
            
            <div 
              className="flex-1 bg-[#1a1c20] p-4 lg:p-8 overflow-auto flex items-center justify-center relative touch-none select-none"
              onPointerMove={handlePointerMove}
              onPointerUp={handlePointerUp}
              onPointerLeave={handlePointerUp}
              onClick={(e) => {
                if (e.target === containerRef.current) setSelectedId(null);
              }}
            >
              <div 
                ref={containerRef}
                className="relative bg-[#111215] border border-green-600 shadow-2xl shrink-0"
                style={{ 
                  width: '100%', 
                  maxWidth: '1200px',
                  aspectRatio: `${TOTAL_WIDTH} / ${TOTAL_HEIGHT}` 
                }}
              >
                <div 
                  className="absolute inset-0 pointer-events-none opacity-10"
                  style={{
                    backgroundImage: `
                      linear-gradient(to right, #ffffff 1px, transparent 1px),
                      linear-gradient(to bottom, #ffffff 1px, transparent 1px)
                    `,
                    backgroundSize: `${(100 / TOTAL_WIDTH) * 100}% ${(100 / TOTAL_HEIGHT) * 100}%`
                  }}
                />

                <div 
                  className="absolute top-0 bottom-0 border-l border-green-600 pointer-events-none"
                  style={{ left: `${(1800 / TOTAL_WIDTH) * 100}%` }}
                />

                <div className="absolute top-[-24px] text-green-500 text-xs font-bold whitespace-nowrap pointer-events-none" style={{ left: '36%' }}>
                  草皮/碎石區 1800
                </div>
                <div className="absolute top-[-24px] text-green-500 text-xs font-bold whitespace-nowrap pointer-events-none" style={{ left: '86%' }}>
                  雨棚區 700
                </div>
                <div className="absolute left-[-28px] top-[50%] text-red-500 text-xs font-bold whitespace-nowrap -rotate-90 pointer-events-none">
                  800
                </div>

                {items.map(item => {
                  const isSelected = selectedId === item.id;
                  
                  return (
                    <div
                      key={item.id}
                      onPointerDown={(e) => handlePointerDown(e, item.id)}
                      className={`absolute cursor-move flex items-center justify-center text-center leading-tight touch-none transition-shadow
                        ${item.type === 'dashed' ? 'border-2 border-dashed' : 'border border-solid'}
                        ${item.borderColor} ${item.color}
                        ${isSelected ? 'ring-2 ring-blue-400 ring-offset-2 ring-offset-[#111215] z-10' : 'hover:ring-1 hover:ring-white/30 z-0'}
                        ${draggingId === item.id ? 'opacity-80' : 'opacity-100'}
                      `}
                      style={{
                        left: `${(item.x / TOTAL_WIDTH) * 100}%`,
                        top: `${(item.y / TOTAL_HEIGHT) * 100}%`,
                        width: `${(item.w / TOTAL_WIDTH) * 100}%`,
                        height: `${(item.h / TOTAL_HEIGHT) * 100}%`,
                        transform: `rotate(${item.rotation || 0}deg)`,
                        fontSize: 'clamp(0.6rem, 1.2vw, 1rem)',
                        fontWeight: 700,
                        textShadow: '1px 1px 2px rgba(0,0,0,0.8)'
                      }}
                    >
                      {item.door && (
                        <div 
                          className="absolute bg-fuchsia-600"
                          style={{
                            ...(item.door === 'left' ? { left: '-4px', top: '20%', bottom: '20%', width: '4px' } : {}),
                            ...(item.door === 'right' ? { right: '-4px', top: '20%', bottom: '20%', width: '4px' } : {}),
                            ...(item.door === 'top' ? { top: '-4px', left: '20%', right: '20%', height: '4px' } : {}),
                            ...(item.door === 'bottom' ? { bottom: '-4px', left: '20%', right: '20%', height: '4px' } : {}),
                          }}
                        />
                      )}
                      
                      <div>
                        {item.name.split('\n').map((line, i) => (
                          <div key={i}>{line}</div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="w-full lg:w-80 bg-slate-900 border-t lg:border-t-0 lg:border-l border-slate-800 p-5 flex flex-col shrink-0 overflow-y-auto">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-lg font-semibold flex items-center gap-2">
                  <Settings2 className="w-5 h-5 text-slate-400" />
                  屬性設定
                </h2>
                <button 
                  onClick={addNewItem}
                  className="p-1.5 bg-blue-500/20 text-blue-400 hover:bg-blue-500/30 rounded-md transition-colors"
                  title="新增物件"
                >
                  <Plus className="w-5 h-5" />
                </button>
              </div>

              {selectedItemData ? (
                <div className="space-y-5">
                  <div>
                    <label className="block text-xs font-medium text-slate-400 mb-1">名稱 (可換行)</label>
                    <textarea 
                      value={selectedItemData.name}
                      onChange={(e) => updateSelectedItem({ name: e.target.value })}
                      className="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-sm focus:outline-none focus:border-fuchsia-500 h-20 resize-none"
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-xs font-medium text-slate-400 mb-1">寬度 (W) cm</label>
                      <input 
                        type="number" 
                        value={selectedItemData.w}
                        onChange={(e) => updateSelectedItem({ w: Number(e.target.value) || 0 })}
                        className="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-sm focus:outline-none focus:border-fuchsia-500"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-slate-400 mb-1">深度 (H) cm</label>
                      <input 
                        type="number" 
                        value={selectedItemData.h}
                        onChange={(e) => updateSelectedItem({ h: Number(e.target.value) || 0 })}
                        className="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-sm focus:outline-none focus:border-fuchsia-500"
                      />
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-xs font-medium text-slate-400 mb-1">X 座標 (左距)</label>
                      <input 
                        type="number" 
                        value={Math.round(selectedItemData.x)}
                        onChange={(e) => updateSelectedItem({ x: Number(e.target.value) || 0 })}
                        className="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-sm focus:outline-none focus:border-fuchsia-500"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-slate-400 mb-1">Y 座標 (上距)</label>
                      <input 
                        type="number" 
                        value={Math.round(selectedItemData.y)}
                        onChange={(e) => updateSelectedItem({ y: Number(e.target.value) || 0 })}
                        className="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-sm focus:outline-none focus:border-fuchsia-500"
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-medium text-slate-400 mb-2">出入口位置 (門標記)</label>
                    <div className="flex gap-2">
                      {[
                        { value: 'top', label: '上' },
                        { value: 'bottom', label: '下' },
                        { value: 'left', label: '左' },
                        { value: 'right', label: '右' },
                        { value: null, label: '無' }
                      ].map(option => (
                        <button
                          key={option.value || 'none'}
                          onClick={() => updateSelectedItem({ door: option.value })}
                          className={`flex-1 py-1.5 text-sm rounded-md border transition-colors ${
                            selectedItemData.door === option.value
                              ? 'bg-fuchsia-600 border-fuchsia-500 text-white font-medium'
                              : 'bg-slate-950 border-slate-800 text-slate-400 hover:border-slate-600 hover:text-slate-200'
                          }`}
                        >
                          {option.label}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="flex justify-between text-xs font-medium text-slate-400 mb-1">
                      <span>外觀旋轉角度</span>
                      <span>{selectedItemData.rotation || 0}°</span>
                    </label>
                    <button 
                      onClick={() => updateSelectedItem({ rotation: ((selectedItemData.rotation || 0) + 90) % 360 })}
                      className="w-full flex items-center justify-center gap-2 py-2 bg-slate-950 border border-slate-800 hover:border-fuchsia-500 rounded-md text-sm transition-colors text-slate-300"
                    >
                      <RotateCw className="w-4 h-4 text-fuchsia-500" />
                      點擊順時針旋轉 90°
                    </button>
                  </div>

                  <div className="pt-4 border-t border-slate-800 flex flex-col gap-2">
                    <button 
                      onClick={rotateSelectedItem}
                      className="w-full flex items-center justify-center gap-2 py-2 bg-slate-800 hover:bg-slate-700 rounded-md text-sm font-medium transition-colors"
                    >
                      <RotateCw className="w-4 h-4" />
                      長寬對調 (重新設定尺寸)
                    </button>
                    <button 
                      onClick={deleteSelectedItem}
                      className="w-full flex items-center justify-center gap-2 py-2 bg-red-500/10 text-red-500 hover:bg-red-500/20 rounded-md text-sm font-medium transition-colors"
                    >
                      <Trash2 className="w-4 h-4" />
                      刪除此物件
                    </button>
                  </div>

                </div>
              ) : (
                <div className="flex-1 flex flex-col items-center justify-center text-slate-500 text-center text-sm p-4">
                  <Move className="w-12 h-12 mb-3 opacity-20" />
                  <p>點擊左側畫布中的物件</p>
                  <p>即可在此檢視與編輯詳細尺寸設定。</p>
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
